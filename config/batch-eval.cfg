# Batch Evaluation Service configuration
# Format: KEY=value  (# comments allowed)
# Env vars with the same key override these values at runtime.

# --- API ---
API_PORT=8000
API_PREFIX=/v1

# --- Database ---
DATABASE_URL=jdbc:sqlite:batch_eval.db

# --- AWS (leave AWS_ENDPOINT_URL empty for real AWS; set for LocalStack) ---
AWS_REGION=us-east-1
AWS_ENDPOINT_URL=
S3_BUCKET=batch-eval-files
SQS_QUEUE_URL=http://localhost:4566/000000000000/batch-eval-jobs

# --- Presigned URLs (results download) ---
DOWNLOAD_URL_TTL_SECONDS=900
RESULT_RETENTION_DAYS=90

# --- Prompt HTTP endpoint ---
PROMPT_ENDPOINT_URL=http://localhost:9000/v1/evaluate
PROMPT_TIMEOUT_SECONDS=60

# --- Retry (429 only) ---
MAX_RETRY_ATTEMPTS=5
RETRY_BASE_DELAY_SECONDS=1.0
RETRY_MAX_DELAY_SECONDS=60.0

# --- Worker throttling ---
WORKER_MAX_CONCURRENCY=4
WORKER_POLL_WAIT_SECONDS=20
WORKER_VISIBILITY_TIMEOUT=300

# --- Ingestion limits ---
MAX_FILE_SIZE_BYTES=209715200
MAX_REQUESTS_PER_FILE=50000

# --- Model priority ---
# Rows (and jobs containing any row) using this model get priority S3 prefix + worker scheduling.
PRIORITY_MODEL=meta-llama-3-8b-instruct
